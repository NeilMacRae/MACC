server {
    listen ${PORT};

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service.
    # Using a variable for proxy_pass defers DNS resolution to request time
    # rather than startup, so nginx starts even if the upstream is temporarily
    # unresolvable. resolver is required when proxy_pass uses a variable.
    location /api/ {
        resolver 8.8.8.8 valid=30s ipv6=off;
        set $upstream http://${BACKEND_URL};
        proxy_pass $upstream/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
